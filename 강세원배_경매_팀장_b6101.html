<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>강세원배 — 팀장 입찰 페이지</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --bg:#07090f; --bg2:#0d1120; --bg3:#131828;
  --gold:#c89b3c; --gold2:#f0c060;
  --white:#fff; --sub:#8090b0; --muted:#4a5578;
  --green:#3ecf7a; --red:#ef4444; --blue:#4f8ef0;
  --border:#1a2040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,155,60,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* ── 로그인 ── */
.login{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
.ltitle{font-family:'Black Han Sans',sans-serif;font-size:24px;text-align:center;}
.ltitle span{color:var(--gold);}
.lsub{font-size:13px;color:var(--sub);text-align:center;}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;}
.lbox h3{font-size:12px;color:var(--gold);margin-bottom:14px;letter-spacing:1px;}
.sel-grid{display:flex;flex-direction:column;gap:7px;}
.cap-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.cap-btn:hover{background:linear-gradient(135deg,#17140a,#1e1a0a);border-color:var(--gold);}
.cap-btn .cname{font-size:14px;font-weight:700;}
.cap-btn .cpts{font-size:13px;color:var(--gold);font-weight:700;}
.cap-btn .cord2{font-size:10px;color:var(--muted);}
.waiting{font-size:13px;color:var(--sub);text-align:center;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── 헤더 ── */
.header{position:relative;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.htitle{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.htitle span{color:var(--gold);}
.hme{font-size:11px;color:var(--gold);font-weight:700;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── 2열 그리드 레이아웃 ── */
.wrap{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;max-width:1100px;margin:0 auto;}
.col-left{display:flex;flex-direction:column;gap:12px;}
.col-right{display:flex;flex-direction:column;gap:12px;}

/* ── 카드 공통 ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.card-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-label{font-size:9px;font-weight:700;letter-spacing:2px;}
.card-label.gold{color:var(--gold);}
.card-label.blue{color:var(--blue);}
.card-label.green{color:var(--green);}
.card-label.sub{color:var(--sub);}
.card-body{padding:14px 16px;}

/* ── 내 현황 ── */
.my-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.stat-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--gold);}
.stat-val.low{color:var(--red);}
.team-label{font-size:9px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;}
.team-slots{display:flex;flex-direction:column;gap:5px;}
.team-chip{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.team-chip.leader{background:#17140a;border:1px solid var(--gold);color:var(--gold);}
.team-chip.filled{background:#0d1a28;border:1px solid var(--blue);color:var(--blue);}
.team-chip.empty{background:var(--bg);border:1px solid var(--border);color:var(--muted);}

/* ── 현재 경매 선수 ── */
.player-row{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.player-em{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,#1a2040,#252d50);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 0 16px rgba(200,155,60,.2);}
.player-name{font-family:'Black Han Sans',sans-serif;font-size:24px;line-height:1;margin-bottom:5px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--sub);}
.tag.t{border-color:var(--gold);color:var(--gold);background:#17140a;}
.tag.r{border-color:var(--blue);color:var(--blue);background:#0d1428;}
.tag.p{border-color:var(--green);color:var(--green);background:#0a1a10;}
.tag.sold-tag{border-color:var(--green);color:var(--green);background:#0a1a10;}
.tag.skip-tag{border-color:var(--red);color:var(--red);background:#1a0808;}
.tag.re-tag{border-color:var(--red);color:var(--red);background:#1a0808;}

/* ── 입찰가 + 카운트다운 ── */
.bid-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.bid-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.bid-lbl{font-size:9px;color:var(--muted);margin-bottom:3px;}
.bid-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--gold);line-height:1;}
.bid-num span{font-size:13px;}
.bid-who{font-size:10px;color:var(--sub);margin-top:2px;}
.bid-who.mine{color:var(--green);}
.bid-who strong{color:var(--white);}
.bid-who.mine strong{color:var(--green);}

/* ── 카운트다운 ── */
.cd-wrap{display:none;}
.cd-wrap.active{display:block;}
.cd-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:5px;}
.cd-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:4px;transition:width .9s linear,background .3s;}
.cd-bar.urgent{background:linear-gradient(90deg,var(--red),#ff6600);}
.cd-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--sub);}
.cd-num{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--green);}
.cd-num.urgent{color:var(--red);animation:urg .5s infinite;}
@keyframes urg{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── 입찰 로그 ── */
.log-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;max-height:90px;overflow-y:auto;margin-bottom:10px;}
.log-head{padding:6px 10px;border-bottom:1px solid var(--border);font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:700;}
.log-row{padding:6px 10px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #0d1020;font-size:12px;}
.log-row:last-child{border-bottom:none;}
.lo{color:var(--muted);width:18px;font-size:10px;}
.ln{color:var(--gold);font-weight:700;width:75px;}
.lp{font-weight:700;margin-left:auto;}
.lp.hi{color:var(--gold);}
.lp.me{color:var(--green);}

/* ── 입찰 영역 ── */
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.qb{background:var(--bg3);border:1px solid var(--border);color:var(--sub);font-size:11px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:all .15s;}
.qb:hover{border-color:var(--gold);color:var(--gold);}
.input-row{display:flex;gap:8px;margin-bottom:8px;}
.bid-input{background:var(--bg3);border:1px solid var(--border);color:var(--white);font-size:20px;font-weight:700;padding:11px 14px;border-radius:8px;outline:none;text-align:center;flex:1;min-width:0;}
.bid-input:focus{border-color:var(--gold);}
.bid-btn{padding:13px 20px;border-radius:9px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;width:100%;}
.bid-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090f;}
.bid-btn.active:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,155,60,.4);}
.bid-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;background:var(--bg3);color:var(--muted);border:1px solid var(--border);}

/* ── 다음 선수 ── */
.next-item{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.next-item:last-child{border-bottom:none;}
.next-num{font-size:10px;color:var(--muted);width:26px;flex-shrink:0;}
.next-em{font-size:18px;flex-shrink:0;}
.next-name{font-size:13px;font-weight:700;}
.next-sub{font-size:10px;color:var(--gold);margin-top:1px;}

/* ── 전체 팀장 현황 ── */
.ac-row{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ac-row:last-child{border-bottom:none;}
.ac-ord{width:20px;height:20px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);font-size:9px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-name{font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ac-pts{font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0;}
.ac-pts.lo{color:var(--red);}
.ac-slots{display:flex;gap:3px;flex-shrink:0;}
.slot{height:24px;border-radius:5px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);padding:0 4px;min-width:20px;}
.slot.ok{background:#0d1a28;border-color:var(--blue);color:var(--blue);font-size:9px;font-weight:700;}
.slot.me{background:#0a1a10;border-color:var(--green);color:var(--green);font-weight:700;}
.slot.ldr{background:#17140a;border-color:var(--gold);color:var(--gold);font-size:11px;}


/* ── 팀장 화면 전용 레이아웃 / 누락 스타일 보강 ── */
.wrap{grid-template-columns:minmax(320px,410px) minmax(0,1fr);align-items:start;max-width:1480px;gap:16px;padding:16px;}
.mycard,.stage,.next-card,.all-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.22);}
.mycard,.all-card{position:sticky;top:74px;}
.mycard{display:flex;flex-direction:column;gap:0;margin-bottom:16px;}
.mid-col{display:flex;flex-direction:column;gap:16px;min-width:0;}
.all-card{max-height:calc(100vh - 92px);overflow:hidden;display:flex;flex-direction:column;}
.ac-list{overflow:auto;}
.mc-head,.s-head,.next-head,.ac-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,rgba(23,20,10,.72),rgba(13,17,32,.96));}
.mc-label,.s-label,.next-head,.ac-head{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--gold);}
.mc-name,.s-prog{font-size:12px;color:var(--sub);font-weight:700;}
.s-prog strong{color:var(--gold);}
.mc-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc-stat,.bid-status{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;}
.mc-stat-label,.bs-label,.mc-mem-label{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;}
.mc-stat-val,.bs-num{font-family:'Black Han Sans',sans-serif;font-size:32px;line-height:1;color:var(--gold);}
.mc-stat-val.low{color:var(--red);}
.mc-members{padding:0 18px 18px;}
.mem-row{display:grid;grid-template-columns:1fr;gap:10px;}
.mem-chip{min-height:56px;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-0.02em;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.mem-chip.leader{background:#17140a;border:1px solid var(--gold);color:var(--gold);}
.mem-chip.filled{background:#0d1a28;border:1px solid var(--blue);color:#b9d7ff;}
.mem-chip.empty{background:var(--bg);border:1px dashed var(--border);color:var(--muted);}
.player-box{padding:16px 18px;}
.pb-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;min-width:0;}
.pb-em{width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,#1a2040,#252d50);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;box-shadow:0 0 22px rgba(200,155,60,.18);}
.pb-info{min-width:0;flex:1;}
.pb-name{font-family:'Black Han Sans',sans-serif;font-size:34px;line-height:1.1;margin-bottom:8px;word-break:break-all;}
.bs-who{font-size:12px;color:var(--sub);margin-top:4px;min-height:16px;}
.ba-row{display:flex;gap:8px;margin-bottom:10px;}
.ba-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--white);font-size:24px;font-weight:800;padding:15px 16px;border-radius:10px;outline:none;text-align:center;min-width:0;}
.ba-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.12);}
.btn{border:none;border-radius:10px;font-size:16px;font-weight:800;padding:15px 18px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.b-bid{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090f;width:100%;box-shadow:0 8px 18px rgba(200,155,60,.22);}
.next-list{display:flex;flex-direction:column;}
.next-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.next-item:last-child{border-bottom:none;}
.next-em{font-size:22px;flex-shrink:0;}
.next-name{font-size:15px;font-weight:800;line-height:1.2;word-break:break-all;}
.next-tier,.next-sub{font-size:11px;color:var(--sub);margin-top:4px;}
.ac-row{padding:12px 14px;display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:10px;align-items:start;}
.ac-ord{width:28px;height:28px;font-size:11px;}
.ac-name{font-size:14px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-pts{font-size:13px;align-self:center;}
.ac-slots{grid-column:2 / 4;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.slot{min-height:42px;border-radius:10px;padding:6px 8px;min-width:0;font-size:12px;font-weight:800;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.slot.ok,.slot.me{font-size:13px;}
.slot.ldr{font-size:16px;}
.log-wrap{max-height:180px;border-radius:10px;}
.log-head{padding:8px 12px;font-size:10px;}
.log-row{padding:8px 12px;font-size:13px;}
.lo{width:20px;}
.ln{width:96px;}
.quick-btns{gap:6px;}
.qb{font-size:12px;padding:7px 12px;border-radius:8px;}

@media (max-width: 1260px){
  .wrap{grid-template-columns:1fr;max-width:1100px;}
  .mycard,.all-card{position:static;}
  .all-card{max-height:none;}
}
@media (max-width: 760px){
  .wrap{padding:12px;gap:12px;}
  .mc-body{grid-template-columns:1fr;}
  .pb-top{align-items:flex-start;}
  .pb-name{font-size:28px;}
  .mem-chip{font-size:16px;min-height:52px;}
  .ac-slots{grid-template-columns:repeat(3,minmax(0,1fr));}
}

/* ── 팝업 ── */
.start-popup{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(7,9,15,.75);backdrop-filter:blur(4px);}
.start-popup-box{background:linear-gradient(135deg,#0a1a10,#0d2415);border:2px solid var(--green);border-radius:20px;padding:36px 52px;text-align:center;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.sp-em{font-size:52px;margin-bottom:10px;display:block;animation:bns .5s infinite alternate;}
@keyframes bns{from{transform:scale(1);}to{transform:scale(1.15);}}
.sp-title{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--green);margin-bottom:5px;}
.sp-sub{font-size:12px;color:var(--sub);margin-bottom:7px;}
.sp-name{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--white);}
.result-popup{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(7,9,15,.78);backdrop-filter:blur(4px);}
.result-box{border-radius:20px;padding:34px 50px;text-align:center;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.result-box.sold{background:linear-gradient(135deg,#17140a,#231a0a);border:2px solid var(--gold);}
.result-box.skip{background:linear-gradient(135deg,#1a0a0a,#2a1010);border:2px solid var(--red);}
.res-em{font-size:48px;margin-bottom:8px;display:block;}
.res-title{font-family:'Black Han Sans',sans-serif;font-size:24px;margin-bottom:5px;}
.result-box.sold .res-title{color:var(--gold);}
.result-box.skip .res-title{color:var(--red);}
.res-sub{font-size:13px;color:var(--sub);}
.flash{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.flash-box{background:linear-gradient(135deg,#17140a,#231a0a);border:2px solid var(--gold);border-radius:18px;padding:30px 44px;text-align:center;animation:fa .85s ease forwards;}
@keyframes fa{0%{opacity:0;transform:scale(.8);}20%{opacity:1;transform:scale(1.04);}70%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.95);}}
.fem{font-size:40px;margin-bottom:8px;display:block;}
.ftit{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--gold);margin-bottom:3px;}
.fsub{font-size:12px;color:var(--sub);}
.flash-win .ftit{color:var(--green);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="ltitle">강세원배 <span>증강 옥션 칼바람</span></div>
  <div class="lsub">본인 팀장을 선택하세요</div>
  <div class="lbox">
    <h3>👑 팀장 선택</h3>
    <div class="sel-grid" id="capSelect">
      <div class="waiting">진행자가 경매를 시작하길 기다리는 중...</div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="dot"></div>
      <div class="htitle">강세원배 <span>경매</span></div>
    </div>
    <div class="hme" id="myLabel">-</div>
  </div>

  <div class="wrap">
    <!-- 왼쪽: 내 현황 -->
    <div class="mycard">
      <div class="mc-head">
        <div class="mc-label">내 현황</div>
        <div class="mc-name" id="myName">-</div>
      </div>
      <div class="mc-body">
        <div class="mc-stat">
          <div class="mc-stat-label">보유 포인트</div>
          <div class="mc-stat-val" id="myPts">400<span style="font-size:13px;">점</span></div>
        </div>
        <div class="mc-stat">
          <div class="mc-stat-label">확보 팀원</div>
          <div class="mc-stat-val" id="myMemCnt">0 <span style="font-size:13px;">/ 4명</span></div>
        </div>
      </div>
      <div class="mc-members">
        <div class="mc-mem-label">팀 구성</div>
        <div class="mem-row" id="myMembers"></div>
      </div>
    </div>

    <!-- 가운데: 현재 경매 + 입찰 -->
    <div class="mid-col">
      <div class="stage">
        <div class="s-head">
          <div class="s-label" id="stLabel">🏪 현재 경매 중</div>
          <div class="s-prog">완료 <strong id="doneN">0</strong> / <span id="totN">0</span></div>
        </div>
        <div class="player-box">
          <div class="pb-top">
            <div class="pb-em" id="pEm">?</div>
            <div class="pb-info">
              <div class="pb-name" id="pName">대기 중...</div>
              <div class="tags" id="pTags"></div>
            </div>
          </div>
          <div class="bid-status">
            <div class="bs-label">현재 최고 입찰가</div>
            <div class="bs-num" id="bidNum">0<span>점</span></div>
            <div class="bs-who" id="bidWho">입찰자 없음</div>
          </div>
          <div class="cd-wrap" id="cdWrap">
            <div class="cd-bar-bg"><div class="cd-bar" id="cdBar" style="width:100%;"></div></div>
            <div class="cd-row"><span>⏱ 낙찰/유찰까지</span><span class="cd-num" id="cdNum">10</span></div>
          </div>
        </div>
        <div style="padding:0 16px 6px;">
          <div class="log-wrap">
            <div class="log-head">📋 입찰 내역</div>
            <div id="logList"></div>
          </div>
        </div>
        <div class="player-box">
          <div class="quick-btns" id="quickBtns"></div>
          <div class="ba-row">
            <input type="number" class="ba-input" id="bidInput" placeholder="포인트 입력" min="1">
          </div>
          <button class="btn b-bid" id="bidBtn" onclick="sendBidRequest()">✋ 입찰하기</button>
          <p style="font-size:10px;color:var(--muted);text-align:center;margin-top:6px;">입찰 후 진행자가 낙찰을 확정합니다</p>
        </div>
      </div>

      <!-- 다음 경매 선수 미리보기 -->
      <div class="next-card">
        <div class="next-head">⏭ 다음 경매 예정 선수</div>
        <div class="next-list" id="nextList"></div>
      </div>
    </div>

    <!-- 오른쪽: 전체 팀장 현황 -->
    <div class="all-card">
      <div class="ac-head">👑 전체 팀장 현황</div>
      <div class="ac-list" id="allCaps"></div>
    </div>
  </div>
</div>

<!-- 플래시 -->
<div class="flash" id="flash" style="display:none;">
  <div class="flash-box" id="flashBox">
    <div class="fem" id="fEm">🏆</div>
    <div class="ftit" id="fTit">낙찰!</div>
    <div class="fsub" id="fSub"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  🔥 FIREBASE CONFIG — 진행자 페이지와 동일한 값으로 교체하세요
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyB2XBCwviok68_RokWMmI8B9Q4QexODzgo",
  authDomain: "action-lol-2601.firebaseapp.com",
  databaseURL: "https://action-lol-2601-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "action-lol-2601",
  storageBucket: "action-lol-2601.firebasestorage.app",
  messagingSenderId: "87438019571",
  appId: "1:87438019571:web:217901e16dd09c423ce086"
};
// ══════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref('auction');
const reqRef = db.ref('bidRequests');
const signalRef = db.ref('auctionSignal');
const resultRef = db.ref('auctionResult');

let myCapId = null;
let state = null;
let lastSignalTs = 0;
let lastResultTs = 0;
const ROLE_EM = { '탱커':'🛡️','딜러':'⚔️','서포터':'💊' };
const TIER_EM = { '아이언':'🪨','브론즈':'🟤','실버':'⚪','골드':'🟡','플래티넘':'🩵','에메랄드':'💚','다이아':'💎','마스터':'🔮','그랜드마스터':'🔴','챌린저':'👑' };

// ── 효과음 ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  try {
    const g = AC.createGain(); g.connect(AC.destination);
    if (type === 'start') {
      [523,659,784,1047].forEach((f,i) => {
        const o = AC.createOscillator(); o.connect(g); o.type='sine'; o.frequency.value=f;
        const t = AC.currentTime + i*0.12;
        g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o.start(t); o.stop(t+0.28);
      });
    } else if (type === 'sold') {
      [523,523,784,784,1047].forEach((f,i) => {
        const o = AC.createOscillator(); o.connect(g); o.type='triangle'; o.frequency.value=f;
        const t = AC.currentTime + i*0.15;
        g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t); o.stop(t+0.3);
      });
    } else if (type === 'skip') {
      const o = AC.createOscillator(); o.connect(g); o.type='sawtooth';
      o.frequency.setValueAtTime(400,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(150,AC.currentTime+0.4);
      g.gain.setValueAtTime(0.2,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
      o.start(); o.stop(AC.currentTime+0.4);
    }
  } catch(e) {}
}

// ── 카운트다운 (Firebase countdownTs 구독) ──
let cdTimer = null;
let cdSec = 0;

function startCd(sec) {
  stopCd();
  cdSec = sec;
  document.getElementById('cdWrap').classList.add('active');
  updateCdUI();
  cdTimer = setInterval(() => {
    cdSec--;
    if (cdSec < 0) cdSec = 0;
    updateCdUI();
    if (cdSec <= 0) stopCd();
  }, 1000);
}

function stopCd() {
  clearInterval(cdTimer); cdTimer = null;
  document.getElementById('cdWrap').classList.remove('active');
  cdSec = 0;
  updateCdUI();
}

function updateCdUI() {
  const pct = (cdSec / 10) * 100;
  const bar = document.getElementById('cdBar');
  const num = document.getElementById('cdNum');
  if (!bar || !num) return;
  bar.style.width = pct + '%';
  num.textContent = cdSec;
  const urgent = cdSec <= 3 && cdSec > 0;
  bar.className = 'cd-bar' + (urgent ? ' urgent' : '');
  num.className = 'cd-num' + (urgent ? ' urgent' : '');
}

// Firebase countdown 신호 구독
db.ref('countdownSignal').on('value', snap => {
  const data = snap.val();
  if (!data) { stopCd(); return; }
  countdownRunning = !!(data && data.running && data.startedAt);
  if (data.running && data.startedAt) {
    const elapsed = Math.floor((Date.now() - data.startedAt) / 1000);
    const remaining = Math.max(0, 10 - elapsed);
    if (remaining > 0) startCd(remaining);
    else stopCd();
  } else {
    stopCd();
  }
  updateBidBtnLock();
});

// auctionOpen 구독 — 경매 시작 전 입찰 버튼 잠금
let auctionOpen = false;
function isAuctionActuallyOpen() {
  return auctionOpen || countdownRunning;
}
db.ref('auctionOpen').on('value', snap => {
  auctionOpen = snap.val() === true;
  updateBidBtnLock();
});

function updateBidBtnLock(forceText) {
  const btn = document.getElementById('bidBtn');
  if (!btn || myCapId === null) return;
  const openNow = isAuctionActuallyOpen();
  if (!openNow) {
    btn.disabled = true;
    btn.textContent = forceText || '🔒 경매 시작 전 입찰 불가';
    btn.style.cssText = 'opacity:0.4;cursor:not-allowed;background:var(--bg3);color:var(--muted);border:1px solid var(--border);width:100%;font-size:14px;padding:14px;border-radius:10px;font-weight:700;';
  } else {
    btn.style.cssText = '';
    btn.disabled = false;
    btn.textContent = forceText || '✋ 입찰하기';
  }
}

// ── 경매 시작 신호 구독 ──
signalRef.on('value', snap => {
  const data = snap.val();
  if (!data || !myCapId === null || data.ts === lastSignalTs) return;
  if (data.ts <= lastSignalTs) return;
  lastSignalTs = data.ts;
  if (myCapId === null) return; // 로그인 전이면 무시
  showStartPopup(data.playerNick, data.playerRole, data.playerTier);
});

// ── 경매 결과 신호 구독 ──
resultRef.on('value', snap => {
  const data = snap.val();
  if (!data || data.ts <= lastResultTs) return;
  lastResultTs = data.ts;
  if (myCapId === null) return;
  showResultPopup(data);
});

// ── 팝업 함수 ──
function showStartPopup(nick, role, tier) {
  playSound('start');
  const roleEm = ROLE_EM[role] || '👤';
  const el = document.createElement('div');
  el.className = 'start-popup';
  el.innerHTML = `
    <div class="start-popup-box">
      <span class="sp-em">${roleEm}</span>
      <div class="sp-title">⚡ 경매가 시작되었습니다!</div>
      <div class="sp-sub">${tier ? `${tier} /` : ''} ${role || ''}</div>
      <div class="sp-name">${nick}</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function showResultPopup(data) {
  const isSold = data.type === 'sold';
  playSound(isSold ? 'sold' : 'skip');
  const el = document.createElement('div');
  el.className = 'result-popup';
  const isMe = isSold && state && state.captains &&
    state.captains.find(c => c.id === myCapId && c.name === data.capName);
  el.innerHTML = `
    <div class="result-box ${isSold ? 'sold' : 'skip'}">
      <span class="res-em">${isSold ? (isMe ? '🎉' : '🏆') : '⏭'}</span>
      <div class="res-title">${isSold ? (isMe ? '내 팀에 낙찰!' : '낙찰 확정!') : '유찰'}</div>
      <div class="res-sub">${isSold ? `${data.playerNick} → ${data.capName} (${data.price}점)` : `${data.playerNick} — 재경매 예정`}</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// 상태 구독
function toArr(obj) {
  if (!obj) return [];
  if (Array.isArray(obj)) return obj;
  return Object.values(obj);
}

// 상태 구독
ref.on('value', snap => {
  const raw = snap.val();
  if (!raw) return;

  // Firebase 객체 → 배열 정규화
  const data = {
    ...raw,
    captains: toArr(raw.captains),
    players:  toArr(raw.players),
    bidLog:   toArr(raw.bidLog),
    skipped:  toArr(raw.skipped),
  };

  const prev = state;
  state = data;

  // 로그인 화면 — 팀장 목록 갱신
  if (myCapId === null) {
    renderLoginCaps(data.captains);
    return;
  }

  // 낙찰 감지 (플래시 표시)
  if (prev && prev.players && data.players) {
    data.players.forEach(p => {
      const prevP = prev.players.find(x => x.id === p.id);
      const wasSold = prevP && prevP.soldTo !== undefined && prevP.soldTo !== null && prevP.soldTo !== -1;
      const nowSold = p.soldTo !== undefined && p.soldTo !== null && p.soldTo !== -1;
      if (prevP && !wasSold && nowSold) {
        const cap = data.captains.find(c => c.id === p.soldTo);
        showFlash(p.nick, cap ? cap.name : '', p.price, p.soldTo === myCapId);
      }
    });
  }

  renderMain(data);
});

function renderLoginCaps(caps) {
  if (!caps || !caps.length) return;
  const el = document.getElementById('capSelect');
  el.innerHTML = caps.map(c => `
    <div class="cap-btn" onclick="selectCap(${c.id})">
      <div>
        <div class="cord2">${c.order}번 순서</div>
        <div class="cname">${c.name}</div>
      </div>
      <div class="cpts">${c.points}점</div>
    </div>`).join('');
}

function selectCap(id) {
  myCapId = id;
  document.getElementById('login').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  updateBidBtnLock();
  if (state) renderMain(state);
}

function renderMain(data) {
  if (!data.captains || myCapId === null) return;
  const me = data.captains.find(c => c.id === myCapId);
  if (!me) return;

  // 내 정보
  document.getElementById('myLabel').textContent = `${me.order}번 ${me.name}`;
  document.getElementById('myName').textContent = me.name;
  const ptsEl = document.getElementById('myPts');
  ptsEl.innerHTML = `${me.points}<span style="font-size:14px;">점</span>`;
  ptsEl.className = `mc-stat-val${me.points < 80 ? ' low' : ''}`;
  const memArr = toArr(me.members);
  document.getElementById('myMemCnt').innerHTML = `${memArr.length} <span style="font-size:14px;">/ 4명</span>`;

  const memRow = document.getElementById('myMembers');
  memRow.innerHTML = `<div class="mem-chip leader">👑 ${me.name}</div>` +
    Array.from({length:4}, (_,i) => {
      const m = memArr[i];
      return m
        ? `<div class="mem-chip filled">👤 ${m.nick.slice(0,8)}</div>`
        : `<div class="mem-chip empty">팀원 ${i+1}</div>`;
    }).join('');

  // 현재 경매 선수 — 진행자와 동일하게 players 전체 순서 사용
  const skippedIds = toArr(data.skipped); // id 배열
  // 일반 경매: players 전체를 순서대로 (낙찰/유찰 포함), 재경매: skipped id → player 객체
  const active = data.isReauction
    ? skippedIds.map(id => data.players.find(p => p.id === id)).filter(Boolean)
    : data.players; // 전체 순서 그대로
  const player = active[data.currentIdx];

  document.getElementById('stLabel').textContent = data.isReauction ? '🔁 재경매 진행 중' : '🏪 현재 경매 중';
  document.getElementById('totN').textContent = data.players.length;
  document.getElementById('doneN').textContent = data.players.filter(p => p.soldTo !== null).length;

  if (player) {
    // soldTo: -1 = 미낙찰, 0~9 = 낙찰된 팀장 id
    const isSold = player.soldTo !== undefined && player.soldTo !== null && player.soldTo !== -1;
    const isSkipped = skippedIds.includes(player.id);
    document.getElementById('pEm').textContent = ROLE_EM[player.role] || '👤';
    document.getElementById('pName').textContent = player.nick;
    document.getElementById('pTags').innerHTML = `
      <span class="tag t">${TIER_EM[player.tier]||''} ${player.tier||'미입력'}</span>
      <span class="tag r">${ROLE_EM[player.role]||''} ${player.role||'미입력'}</span>
      <span class="tag p">🎫 ${player.pass||'미입력'}</span>
      ${data.isReauction ? '<span class="tag re">🔁 재경매</span>' : ''}
      ${isSold ? '<span class="tag" style="border-color:#3ecf7a;color:#3ecf7a;background:#0a1a10;">✅ 낙찰완료</span>' : ''}
      ${isSkipped && !data.isReauction ? '<span class="tag" style="border-color:#ef4444;color:#ef4444;background:#1a0808;">⏭ 유찰대기</span>' : ''}
    `;
  } else {
    document.getElementById('pEm').textContent = '⏳';
    document.getElementById('pName').textContent = '팀원 추가 대기 중...';
    document.getElementById('pTags').innerHTML = '';
  }

  // 입찰 현황
  const bid = data.currentBid || 0;
  const bidCapId = data.currentBidCapId;
  document.getElementById('bidNum').innerHTML = `${bid}<span>점</span>`;
  const whoEl = document.getElementById('bidWho');
  const bidCap = data.captains.find(c => c.id === bidCapId);
  if (bidCapId !== null && bidCapId !== undefined && bidCap) {
    const isMe = bidCapId === myCapId;
    whoEl.className = `bs-who${isMe ? ' mine' : ''}`;
    whoEl.innerHTML = isMe
      ? `✅ <strong>내가 최고 입찰 중!</strong>`
      : `최고 입찰자: <strong>${bidCap.name}</strong>`;
  } else {
    whoEl.className = 'bs-who';
    whoEl.textContent = '입찰자 없음';
  }

  // 입찰 로그
  const logList = document.getElementById('logList');
  const bidLog = toArr(data.bidLog);
  if (bidLog.length > 0) {
    logList.innerHTML = [...bidLog].reverse().map((b, i) => {
      const isMe = b.capId === myCapId;
      return `<div class="log-row">
        <span class="lo">${b.capId + 1}</span>
        <span class="ln">${b.capName}</span>
        <span class="lp ${i===0?'hi':''} ${isMe?'me':''}">${b.amount}점${isMe?' ← 나':''}</span>
      </div>`;
    }).join('');
  } else {
    logList.innerHTML = '';
  }

  // 빠른 입찰 버튼
  const quickBtns = document.getElementById('quickBtns');
  if (bid > 0) {
    quickBtns.innerHTML = [1,5,10,20,50].map(n => {
      const v = bid + n;
      return v <= me.points ? `<button class="qb" onclick="setQuick(${v})">+${n} (${v}점)</button>` : '';
    }).filter(Boolean).join('');
  } else {
    quickBtns.innerHTML = [10,20,30,50,80,100].map(v =>
      v <= me.points ? `<button class="qb" onclick="setQuick(${v})">${v}점</button>` : ''
    ).filter(Boolean).join('');
  }

  // 입찰 버튼
  const bidBtn = document.getElementById('bidBtn');
  const isSoldPlayer = player && player.soldTo !== undefined && player.soldTo !== null && player.soldTo !== -1;
  const isSkippedPlayer = player && skippedIds.includes(player.id);
  const auctionLive = isAuctionActuallyOpen();
  const canBid = auctionLive && !me.isFull && player && !isSoldPlayer && !isSkippedPlayer;
  bidBtn.disabled = !canBid;
  if (!auctionLive) updateBidBtnLock('🔒 경매 시작 전 입찰 불가');
  else if (me.isFull) { bidBtn.textContent = '✅ 팀원 4명 완성!'; bidBtn.style.cssText = ''; }
  else if (isSoldPlayer) { bidBtn.textContent = '✅ 이미 낙찰된 선수'; bidBtn.style.cssText = ''; }
  else if (isSkippedPlayer) { bidBtn.textContent = '⏭ 유찰된 선수 (재경매 예정)'; bidBtn.style.cssText = ''; }
  else { bidBtn.textContent = '✋ 입찰하기'; bidBtn.style.cssText = ''; }

  // 다음 5명 미리보기
  renderNextPlayers(data, active, data.currentIdx);

  renderAllCaps(data.captains);
}

function renderAllCaps(caps) {
  document.getElementById('allCaps').innerHTML = caps.map(c => {
    const isMe = c.id === myCapId;
    const members = toArr(c.members);
    return `<div class="ac-row">
      <div class="ac-ord">${c.order}</div>
      <div class="ac-name" style="${isMe?'color:var(--gold);':''}">${c.name}${isMe?' 👈':''}</div>
      <div class="ac-pts ${c.points<80?'lo':''}">${c.points}점</div>
      <div class="ac-slots">
        <div class="slot ldr">👑</div>
        ${Array.from({length:4},(_,i) => {
          const m = members[i];
          if (!m) return `<div class="slot">${i+1}</div>`;
          return `<div class="slot ${isMe?'me':'ok'}" title="${m.nick} (${m.price||0}점)">${m.nick.slice(0,8)}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderNextPlayers(data, active, curIdx) {
  const nextEl = document.getElementById('nextList');
  if (!nextEl) return;
  const upcoming = [];
  for (let i = curIdx + 1; i < active.length && upcoming.length < 5; i++) {
    const p = active[i];
    if (p && p.soldTo === -1 && !toArr(data.skipped).includes(p.id)) {
      upcoming.push({ p, seq: i });
    }
  }
  if (upcoming.length === 0) {
    nextEl.innerHTML = `<div style="padding:12px 14px;font-size:11px;color:var(--muted);text-align:center;">다음 예정 선수 없음</div>`;
    return;
  }
  nextEl.innerHTML = upcoming.map(({ p, seq }, i) => `
    <div class="next-item">
      <div class="next-num">${seq + 1}번</div>
      <div class="next-em">${ROLE_EM[p.role]||'👤'}</div>
      <div style="flex:1;">
        <div class="next-name">${p.nick}</div>
        <div class="next-tier">${TIER_EM[p.tier]||''} ${p.tier||''} · ${p.role||''}</div>
      </div>
    </div>`).join('');
}

function setQuick(v) {
  document.getElementById('bidInput').value = v;
}

function sendBidRequest() {
  if (myCapId === null || !state) return;
  if (!isAuctionActuallyOpen()) { alert('진행자가 아직 현재 선수의 경매를 시작하지 않았습니다!'); return; }
  const amt = parseInt(document.getElementById('bidInput').value);
  if (!amt || amt <= 0) { alert('포인트를 입력해주세요!'); return; }
  const me = state.captains.find(c => c.id === myCapId);
  if (!me) return;
  if (me.isFull) { alert('팀원이 이미 4명이에요!'); return; }
  if (amt > me.points) { alert(`포인트가 부족해요! (보유: ${me.points}점)`); return; }
  if (amt <= (state.currentBid || 0)) { alert(`현재 최고가(${state.currentBid}점)보다 높아야 해요!`); return; }

  reqRef.push({ capId: myCapId, capName: me.name, amount: amt, ts: Date.now() });
  document.getElementById('bidInput').value = '';

  const btn = document.getElementById('bidBtn');
  const orig = btn.textContent;
  btn.textContent = '✅ 입찰 전송됨!';
  btn.style.cssText = 'background:linear-gradient(135deg,#1a4a20,#1e5a25);color:var(--green);border:1px solid var(--green);';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.cssText = '';
    btn.disabled = false;
  }, 1500);
}

function showFlash(nick, capName, pts, isMe) {
  const box = document.getElementById('flashBox');
  box.className = `flash-box${isMe ? ' flash-win' : ''}`;
  document.getElementById('fEm').textContent = isMe ? '🎉' : '🏆';
  document.getElementById('fTit').textContent = isMe ? `${nick} 낙찰! 내 팀!` : `${nick} 낙찰`;
  document.getElementById('fSub').textContent = `${capName} — ${pts}점`;
  const el = document.getElementById('flash');
  el.style.display = 'flex';
  setTimeout(() => el.style.display = 'none', 900);
}
</script>
</body>
</html>
