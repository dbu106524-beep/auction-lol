<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강세원배 — 팀장 입찰 페이지</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --bg:#07090f; --bg2:#0d1120; --bg3:#131828;
  --gold:#c89b3c; --gold2:#f0c060;
  --white:#fff; --sub:#8090b0; --muted:#4a5578;
  --green:#3ecf7a; --red:#ef4444; --blue:#4f8ef0;
  --border:#1a2040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,155,60,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(79,142,240,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* 로그인 화면 */
.login{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;padding:32px;}
.ltitle{font-family:'Black Han Sans',sans-serif;font-size:26px;text-align:center;}
.ltitle span{color:var(--gold);}
.lsub{font-size:13px;color:var(--sub);text-align:center;}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px;}
.lbox h3{font-size:13px;color:var(--gold);margin-bottom:16px;letter-spacing:1px;}
.sel-grid{display:flex;flex-direction:column;gap:8px;}
.cap-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.cap-btn:hover{background:linear-gradient(135deg,#17140a,#1e1a0a);border-color:var(--gold);}
.cap-btn .cname{font-size:14px;font-weight:700;}
.cap-btn .cpts{font-size:13px;color:var(--gold);font-weight:700;}
.cap-btn .cord2{font-size:10px;color:var(--muted);}
.waiting{font-size:13px;color:var(--sub);text-align:center;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* 메인 */
.header{position:relative;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.htitle{font-family:'Black Han Sans',sans-serif;font-size:16px;}
.htitle span{color:var(--gold);}
.hme{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px;}

/* 내 현황 카드 */
.mycard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.mc-head{background:linear-gradient(135deg,#17140a,#1e1a10);border-bottom:1px solid #2a2010;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.mc-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:3px;}
.mc-name{font-family:'Black Han Sans',sans-serif;font-size:20px;}
.mc-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mc-stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.mc-stat-label{font-size:9px;color:var(--muted);margin-bottom:4px;}
.mc-stat-val{font-size:22px;font-weight:900;color:var(--gold);}
.mc-stat-val.low{color:var(--red);}
.mc-members{padding:0 18px 16px;}
.mc-mem-label{font-size:9px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;}
.mem-row{display:flex;gap:6px;flex-wrap:wrap;}
.mem-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.mem-chip.filled{background:#0d1a28;border:1px solid var(--blue);color:var(--blue);}
.mem-chip.empty{background:var(--bg);border:1px solid var(--border);color:var(--muted);}
.mem-chip.leader{background:#17140a;border:1px solid var(--gold);color:var(--gold);}

/* 현재 경매 선수 */
.stage{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.s-head{background:linear-gradient(135deg,#0a1428,#0d1a35);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.s-label{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:3px;}
.s-prog{font-size:11px;color:var(--sub);}
.s-prog strong{color:var(--gold);}

.player-box{padding:20px 20px 16px;}
.pb-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;}
.pb-em{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#1a2040,#252d50);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.pb-info{flex:1;}
.pb-name{font-family:'Black Han Sans',sans-serif;font-size:26px;line-height:1;margin-bottom:6px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--sub);}
.tag.t{border-color:var(--gold);color:var(--gold);background:#17140a;}
.tag.r{border-color:var(--blue);color:var(--blue);background:#0d1428;}
.tag.p{border-color:var(--green);color:var(--green);background:#0a1a10;}
.tag.re{border-color:var(--red);color:var(--red);background:#1a0808;}

.bid-status{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.bs-label{font-size:9px;color:var(--muted);margin-bottom:3px;}
.bs-num{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--gold);line-height:1;}
.bs-num span{font-size:14px;}
.bs-who{font-size:11px;color:var(--sub);margin-top:3px;}
.bs-who strong{color:var(--white);}
.bs-who.mine{color:var(--green);}
.bs-who.mine strong{color:var(--green);}

/* 입찰 로그 */
.log-wrap{margin:0 0 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;max-height:90px;overflow-y:auto;}
.log-head{padding:6px 12px;border-bottom:1px solid var(--border);font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:700;}
.log-row{padding:6px 12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #0d1020;font-size:11px;}
.log-row:last-child{border-bottom:none;}
.lo{color:var(--muted);width:18px;font-size:10px;}
.ln{color:var(--gold);font-weight:700;width:80px;}
.lp{font-weight:700;margin-left:auto;}
.lp.hi{color:var(--gold);}
.lp.me{color:var(--green);}

/* 입찰 버튼 영역 */
.bid-area{padding:0 0 4px;}
.ba-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.ba-input{background:var(--bg3);border:1px solid var(--border);color:var(--white);font-size:18px;font-weight:700;padding:12px 16px;border-radius:10px;outline:none;text-align:center;flex:1;}
.ba-input:focus{border-color:var(--gold);}
.btn{padding:12px 20px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.b-bid{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07090f;width:100%;font-size:16px;padding:14px;}
.b-bid:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,155,60,.4);}
.b-bid:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.qb{background:var(--bg3);border:1px solid var(--border);color:var(--sub);font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
.qb:hover{border-color:var(--gold);color:var(--gold);}

/* 전체 현황 */
.all-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.ac-head{padding:12px 18px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.ac-list{max-height:280px;overflow-y:auto;}
.ac-row{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ac-row:last-child{border-bottom:none;}
.ac-ord{width:20px;height:20px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);font-size:9px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-name{font-size:12px;font-weight:700;flex:1;}
.ac-pts{font-size:12px;font-weight:700;color:var(--gold);}
.ac-pts.lo{color:var(--red);}
.ac-slots{display:flex;gap:3px;margin-left:4px;}
.slot{width:22px;height:22px;border-radius:5px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--muted);}
.slot.ok{background:#0d1a28;border-color:var(--blue);color:var(--blue);font-size:6px;font-weight:700;}
.slot.ldr{background:#17140a;border-color:var(--gold);color:var(--gold);}
.slot.me{background:#0a1a10;border-color:var(--green);color:var(--green);font-size:6px;}

/* 플래시 */
.flash{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.flash-box{background:linear-gradient(135deg,#17140a,#231a0a);border:2px solid var(--gold);border-radius:20px;padding:32px 48px;text-align:center;animation:fa .85s ease forwards;}
@keyframes fa{0%{opacity:0;transform:scale(.8);}20%{opacity:1;transform:scale(1.04);}70%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(.95);}}
.fem{font-size:40px;margin-bottom:8px;}
.ftit{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--gold);margin-bottom:3px;}
.fsub{font-size:13px;color:var(--sub);}
/* 카운트다운 */
.cd-wrap{padding:0 0 12px;display:none;}
.cd-wrap.active{display:block;}
.cd-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.cd-bar{height:100%;background:linear-gradient(90deg,var(--green),#80ff80);border-radius:4px;transition:width .9s linear,background .3s;}
.cd-bar.urgent{background:linear-gradient(90deg,var(--red),#ff6600);}
.cd-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--sub);}
.cd-num{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--green);line-height:1;}
.cd-num.urgent{color:var(--red);animation:blk .5s infinite;}
@keyframes blk{0%,100%{opacity:1;}50%{opacity:.3;}}
.flash-win{border-color:var(--green);}
.flash-win .ftit{color:var(--green);}
/* 카운트다운 */
.cd-wrap{padding:12px 0 0;display:none;}
.cd-wrap.active{display:block;}
.cd-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.cd-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:4px;transition:width .9s linear,background .3s;}
.cd-bar.urgent{background:linear-gradient(90deg,var(--red),#ff6600);}
.cd-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--sub);}
.cd-num{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--green);}
.cd-num.urgent{color:var(--red);animation:urg .5s infinite;}
@keyframes urg{0%,100%{opacity:1;}50%{opacity:.3;}}
/* 경매 시작 팝업 */
.start-popup{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(7,9,15,.75);backdrop-filter:blur(5px);}
.start-popup-box{background:linear-gradient(135deg,#0a1a10,#0d2415);border:2px solid var(--green);border-radius:22px;padding:38px 56px;text-align:center;animation:sp .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes sp{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.sp-em{font-size:58px;margin-bottom:12px;display:block;animation:bns .5s infinite alternate;}
@keyframes bns{from{transform:scale(1);}to{transform:scale(1.2);}}
.sp-title{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--green);margin-bottom:6px;}
.sp-sub{font-size:13px;color:var(--sub);margin-bottom:8px;}
.sp-name{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--white);}
/* 결과 팝업 */
.result-popup{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(7,9,15,.78);backdrop-filter:blur(5px);}
.result-box{border-radius:22px;padding:36px 52px;text-align:center;animation:sp .4s cubic-bezier(.34,1.56,.64,1);}
.result-box.sold{background:linear-gradient(135deg,#17140a,#231a0a);border:2px solid var(--gold);}
.result-box.skip{background:linear-gradient(135deg,#1a0a0a,#2a1010);border:2px solid var(--red);}
.res-em{font-size:52px;margin-bottom:10px;display:block;}
.res-title{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-bottom:6px;}
.result-box.sold .res-title{color:var(--gold);}
.result-box.skip .res-title{color:var(--red);}
.res-sub{font-size:14px;color:var(--sub);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="ltitle">강세원배 <span>증강 옥션 칼바람</span></div>
  <div class="lsub">본인 팀장을 선택하세요</div>
  <div class="lbox">
    <h3>👑 팀장 선택</h3>
    <div class="sel-grid" id="capSelect">
      <div class="waiting">진행자가 경매를 시작하길 기다리는 중...</div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="dot"></div>
      <div class="htitle">강세원배 <span>경매</span></div>
    </div>
    <div class="hme" id="myLabel">-</div>
  </div>

  <div class="wrap">
    <!-- 내 현황 -->
    <div class="mycard">
      <div class="mc-head">
        <div class="mc-label">내 현황</div>
        <div class="mc-name" id="myName">-</div>
      </div>
      <div class="mc-body">
        <div class="mc-stat">
          <div class="mc-stat-label">보유 포인트</div>
          <div class="mc-stat-val" id="myPts">400<span style="font-size:14px;">점</span></div>
        </div>
        <div class="mc-stat">
          <div class="mc-stat-label">확보 팀원</div>
          <div class="mc-stat-val" id="myMemCnt">0 <span style="font-size:14px;">/ 4명</span></div>
        </div>
      </div>
      <div class="mc-members">
        <div class="mc-mem-label">팀 구성</div>
        <div class="mem-row" id="myMembers"></div>
      </div>
    </div>

    <!-- 현재 경매 선수 -->
    <div class="stage">
      <div class="s-head">
        <div class="s-label" id="stLabel">🏪 현재 경매 중</div>
        <div class="s-prog">완료 <strong id="doneN">0</strong> / <span id="totN">0</span></div>
      </div>
      <div class="player-box">
        <div class="pb-top">
          <div class="pb-em" id="pEm">?</div>
          <div class="pb-info">
            <div class="pb-name" id="pName">대기 중...</div>
            <div class="tags" id="pTags"></div>
          </div>
        </div>
        <div class="bid-status">
          <div class="bs-label">현재 최고 입찰가</div>
          <div class="bs-num" id="bidNum">0<span>점</span></div>
          <div class="bs-who" id="bidWho">입찰자 없음</div>
        </div>

        <!-- 카운트다운 -->
        <div class="cd-wrap" id="cdWrap" style="padding:12px 0 0;">
          <div class="cd-bar-bg">
            <div class="cd-bar" id="cdBar" style="width:100%;"></div>
          </div>
          <div class="cd-row">
            <span>⏱ 낙찰/유찰까지</span>
            <span class="cd-num" id="cdNum">10</span>
          </div>
        </div>
      </div>

      <div class="log-wrap" style="margin:0 0 0;">
        <div class="log-head">📋 입찰 내역</div>
        <div id="logList"></div>
      </div>

      <!-- 입찰 영역 -->
      <div class="player-box" id="bidArea">
        <div class="quick-btns" id="quickBtns"></div>
        <div class="ba-row">
          <input type="number" class="ba-input" id="bidInput" placeholder="포인트 입력" min="1">
        </div>
        <button class="btn b-bid" id="bidBtn" onclick="sendBidRequest()">✋ 입찰하기</button>
        <p style="font-size:10px;color:var(--muted);text-align:center;margin-top:8px;">입찰 후 진행자가 낙찰을 확정합니다</p>
      </div>
    </div>

    <!-- 전체 현황 -->
    <div class="all-card">
      <div class="ac-head">👑 전체 팀장 현황</div>
      <div class="ac-list" id="allCaps"></div>
    </div>
  </div>
</div>

<!-- 플래시 -->
<div class="flash" id="flash" style="display:none;">
  <div class="flash-box" id="flashBox">
    <div class="fem" id="fEm">🏆</div>
    <div class="ftit" id="fTit">낙찰!</div>
    <div class="fsub" id="fSub"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  🔥 FIREBASE CONFIG — 진행자 페이지와 동일한 값으로 교체하세요
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyB2XBCwviok68_RokWMmI8B9Q4QexODzgo",
  authDomain: "action-lol-2601.firebaseapp.com",
  databaseURL: "https://action-lol-2601-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "action-lol-2601",
  storageBucket: "action-lol-2601.firebasestorage.app",
  messagingSenderId: "87438019571",
  appId: "1:87438019571:web:217901e16dd09c423ce086"
};
// ══════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref('auction');
const reqRef = db.ref('bidRequests');
const signalRef = db.ref('auctionSignal');
const resultRef = db.ref('auctionResult');

let myCapId = null;
let state = null;
let lastSignalTs = 0;
let lastResultTs = 0;
const ROLE_EM = { '탱커':'🛡️','딜러':'⚔️','서포터':'💊' };
const TIER_EM = { '아이언':'🪨','브론즈':'🟤','실버':'⚪','골드':'🟡','플래티넘':'🩵','에메랄드':'💚','다이아':'💎','마스터':'🔮','그랜드마스터':'🔴','챌린저':'👑' };

// ── 효과음 ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  try {
    const g = AC.createGain(); g.connect(AC.destination);
    if (type === 'start') {
      [523,659,784,1047].forEach((f,i) => {
        const o = AC.createOscillator(); o.connect(g); o.type='sine'; o.frequency.value=f;
        const t = AC.currentTime + i*0.12;
        g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o.start(t); o.stop(t+0.28);
      });
    } else if (type === 'sold') {
      [523,523,784,784,1047].forEach((f,i) => {
        const o = AC.createOscillator(); o.connect(g); o.type='triangle'; o.frequency.value=f;
        const t = AC.currentTime + i*0.15;
        g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t); o.stop(t+0.3);
      });
    } else if (type === 'skip') {
      const o = AC.createOscillator(); o.connect(g); o.type='sawtooth';
      o.frequency.setValueAtTime(400,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(150,AC.currentTime+0.4);
      g.gain.setValueAtTime(0.2,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
      o.start(); o.stop(AC.currentTime+0.4);
    }
  } catch(e) {}
}

// ── 카운트다운 (Firebase countdownTs 구독) ──
let cdTimer = null;
let cdSec = 0;

function startCd(sec) {
  stopCd();
  cdSec = sec;
  document.getElementById('cdWrap').classList.add('active');
  updateCdUI();
  cdTimer = setInterval(() => {
    cdSec--;
    if (cdSec < 0) cdSec = 0;
    updateCdUI();
    if (cdSec <= 0) stopCd();
  }, 1000);
}

function stopCd() {
  clearInterval(cdTimer); cdTimer = null;
  document.getElementById('cdWrap').classList.remove('active');
  cdSec = 0;
  updateCdUI();
}

function updateCdUI() {
  const pct = (cdSec / 10) * 100;
  const bar = document.getElementById('cdBar');
  const num = document.getElementById('cdNum');
  if (!bar || !num) return;
  bar.style.width = pct + '%';
  num.textContent = cdSec;
  const urgent = cdSec <= 3 && cdSec > 0;
  bar.className = 'cd-bar' + (urgent ? ' urgent' : '');
  num.className = 'cd-num' + (urgent ? ' urgent' : '');
}

// Firebase countdown 신호 구독 (진행자가 pushState 할 때마다 countdownTs 전송)
db.ref('countdownSignal').on('value', snap => {
  const data = snap.val();
  if (!data || myCapId === null) return;
  if (data.running) {
    // 서버 타임스탬프 기준으로 남은 시간 계산
    const elapsed = Math.floor((Date.now() - data.startedAt) / 1000);
    const remaining = Math.max(0, 10 - elapsed);
    if (remaining > 0) startCd(remaining);
    else stopCd();
  } else {
    stopCd();
  }
});

// ── 경매 시작 신호 구독 ──
signalRef.on('value', snap => {
  const data = snap.val();
  if (!data || !myCapId === null || data.ts === lastSignalTs) return;
  if (data.ts <= lastSignalTs) return;
  lastSignalTs = data.ts;
  if (myCapId === null) return; // 로그인 전이면 무시
  showStartPopup(data.playerNick, data.playerRole, data.playerTier);
});

// ── 경매 결과 신호 구독 ──
resultRef.on('value', snap => {
  const data = snap.val();
  if (!data || data.ts <= lastResultTs) return;
  lastResultTs = data.ts;
  if (myCapId === null) return;
  showResultPopup(data);
});

// ── 팝업 함수 ──
function showStartPopup(nick, role, tier) {
  playSound('start');
  const roleEm = ROLE_EM[role] || '👤';
  const el = document.createElement('div');
  el.className = 'start-popup';
  el.innerHTML = `
    <div class="start-popup-box">
      <span class="sp-em">${roleEm}</span>
      <div class="sp-title">⚡ 경매가 시작되었습니다!</div>
      <div class="sp-sub">${tier ? `${tier} /` : ''} ${role || ''}</div>
      <div class="sp-name">${nick}</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function showResultPopup(data) {
  const isSold = data.type === 'sold';
  playSound(isSold ? 'sold' : 'skip');
  const el = document.createElement('div');
  el.className = 'result-popup';
  const isMe = isSold && state && state.captains &&
    state.captains.find(c => c.id === myCapId && c.name === data.capName);
  el.innerHTML = `
    <div class="result-box ${isSold ? 'sold' : 'skip'}">
      <span class="res-em">${isSold ? (isMe ? '🎉' : '🏆') : '⏭'}</span>
      <div class="res-title">${isSold ? (isMe ? '내 팀에 낙찰!' : '낙찰 확정!') : '유찰'}</div>
      <div class="res-sub">${isSold ? `${data.playerNick} → ${data.capName} (${data.price}점)` : `${data.playerNick} — 재경매 예정`}</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// 상태 구독
function toArr(obj) {
  if (!obj) return [];
  if (Array.isArray(obj)) return obj;
  return Object.values(obj);
}

// 상태 구독
ref.on('value', snap => {
  const raw = snap.val();
  if (!raw) return;

  // Firebase 객체 → 배열 정규화
  const data = {
    ...raw,
    captains: toArr(raw.captains),
    players:  toArr(raw.players),
    bidLog:   toArr(raw.bidLog),
    skipped:  toArr(raw.skipped),
  };

  const prev = state;
  state = data;

  // 로그인 화면 — 팀장 목록 갱신
  if (myCapId === null) {
    renderLoginCaps(data.captains);
    return;
  }

  // 낙찰 감지 (플래시 표시)
  if (prev && prev.players && data.players) {
    data.players.forEach(p => {
      const prevP = prev.players.find(x => x.id === p.id);
      const wasSold = prevP && prevP.soldTo !== undefined && prevP.soldTo !== null && prevP.soldTo !== -1;
      const nowSold = p.soldTo !== undefined && p.soldTo !== null && p.soldTo !== -1;
      if (prevP && !wasSold && nowSold) {
        const cap = data.captains.find(c => c.id === p.soldTo);
        showFlash(p.nick, cap ? cap.name : '', p.price, p.soldTo === myCapId);
      }
    });
  }

  renderMain(data);
});

function renderLoginCaps(caps) {
  if (!caps || !caps.length) return;
  const el = document.getElementById('capSelect');
  el.innerHTML = caps.map(c => `
    <div class="cap-btn" onclick="selectCap(${c.id})">
      <div>
        <div class="cord2">${c.order}번 순서</div>
        <div class="cname">${c.name}</div>
      </div>
      <div class="cpts">${c.points}점</div>
    </div>`).join('');
}

function selectCap(id) {
  myCapId = id;
  document.getElementById('login').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  if (state) renderMain(state);
}

function renderMain(data) {
  if (!data.captains || myCapId === null) return;
  const me = data.captains.find(c => c.id === myCapId);
  if (!me) return;

  // 내 정보
  document.getElementById('myLabel').textContent = `${me.order}번 ${me.name}`;
  document.getElementById('myName').textContent = me.name;
  const ptsEl = document.getElementById('myPts');
  ptsEl.innerHTML = `${me.points}<span style="font-size:14px;">점</span>`;
  ptsEl.className = `mc-stat-val${me.points < 80 ? ' low' : ''}`;
  const memArr = toArr(me.members);
  document.getElementById('myMemCnt').innerHTML = `${memArr.length} <span style="font-size:14px;">/ 4명</span>`;

  const memRow = document.getElementById('myMembers');
  memRow.innerHTML = `<div class="mem-chip leader">👑 ${me.name}</div>` +
    Array.from({length:4}, (_,i) => {
      const m = memArr[i];
      return m
        ? `<div class="mem-chip filled">⚔️ ${m.nick}</div>`
        : `<div class="mem-chip empty">팀원 ${i+1}</div>`;
    }).join('');

  // 현재 경매 선수 — 진행자와 동일하게 players 전체 순서 사용
  const skippedIds = toArr(data.skipped); // id 배열
  // 일반 경매: players 전체를 순서대로 (낙찰/유찰 포함), 재경매: skipped id → player 객체
  const active = data.isReauction
    ? skippedIds.map(id => data.players.find(p => p.id === id)).filter(Boolean)
    : data.players; // 전체 순서 그대로
  const player = active[data.currentIdx];

  document.getElementById('stLabel').textContent = data.isReauction ? '🔁 재경매 진행 중' : '🏪 현재 경매 중';
  document.getElementById('totN').textContent = data.players.length;
  document.getElementById('doneN').textContent = data.players.filter(p => p.soldTo !== null).length;

  if (player) {
    // soldTo: -1 = 미낙찰, 0~9 = 낙찰된 팀장 id
    const isSold = player.soldTo !== undefined && player.soldTo !== null && player.soldTo !== -1;
    const isSkipped = skippedIds.includes(player.id);
    document.getElementById('pEm').textContent = ROLE_EM[player.role] || '👤';
    document.getElementById('pName').textContent = player.nick;
    document.getElementById('pTags').innerHTML = `
      <span class="tag t">${TIER_EM[player.tier]||''} ${player.tier||'미입력'}</span>
      <span class="tag r">${ROLE_EM[player.role]||''} ${player.role||'미입력'}</span>
      <span class="tag p">🎫 ${player.pass||'미입력'}</span>
      ${data.isReauction ? '<span class="tag re">🔁 재경매</span>' : ''}
      ${isSold ? '<span class="tag" style="border-color:#3ecf7a;color:#3ecf7a;background:#0a1a10;">✅ 낙찰완료</span>' : ''}
      ${isSkipped && !data.isReauction ? '<span class="tag" style="border-color:#ef4444;color:#ef4444;background:#1a0808;">⏭ 유찰대기</span>' : ''}
    `;
  } else {
    document.getElementById('pEm').textContent = '⏳';
    document.getElementById('pName').textContent = '팀원 추가 대기 중...';
    document.getElementById('pTags').innerHTML = '';
  }

  // 입찰 현황
  const bid = data.currentBid || 0;
  const bidCapId = data.currentBidCapId;
  document.getElementById('bidNum').innerHTML = `${bid}<span>점</span>`;
  const whoEl = document.getElementById('bidWho');
  const bidCap = data.captains.find(c => c.id === bidCapId);
  if (bidCapId !== null && bidCapId !== undefined && bidCap) {
    const isMe = bidCapId === myCapId;
    whoEl.className = `bs-who${isMe ? ' mine' : ''}`;
    whoEl.innerHTML = isMe
      ? `✅ <strong>내가 최고 입찰 중!</strong>`
      : `최고 입찰자: <strong>${bidCap.name}</strong>`;
  } else {
    whoEl.className = 'bs-who';
    whoEl.textContent = '입찰자 없음';
  }

  // 입찰 로그
  const logList = document.getElementById('logList');
  const bidLog = toArr(data.bidLog);
  if (bidLog.length > 0) {
    logList.innerHTML = [...bidLog].reverse().map((b, i) => {
      const isMe = b.capId === myCapId;
      return `<div class="log-row">
        <span class="lo">${b.capId + 1}</span>
        <span class="ln">${b.capName}</span>
        <span class="lp ${i===0?'hi':''} ${isMe?'me':''}">${b.amount}점${isMe?' ← 나':''}</span>
      </div>`;
    }).join('');
  } else {
    logList.innerHTML = '';
  }

  // 빠른 입찰 버튼
  const quickBtns = document.getElementById('quickBtns');
  if (bid > 0) {
    quickBtns.innerHTML = [1,5,10,20,50].map(n => {
      const v = bid + n;
      return v <= me.points ? `<button class="qb" onclick="setQuick(${v})">+${n} (${v}점)</button>` : '';
    }).filter(Boolean).join('');
  } else {
    quickBtns.innerHTML = [10,20,30,50,80,100].map(v =>
      v <= me.points ? `<button class="qb" onclick="setQuick(${v})">${v}점</button>` : ''
    ).filter(Boolean).join('');
  }

  // 입찰 버튼
  const bidBtn = document.getElementById('bidBtn');
  const isSoldPlayer = player && player.soldTo !== undefined && player.soldTo !== null && player.soldTo !== -1;
  const isSkippedPlayer = player && skippedIds.includes(player.id);
  const canBid = !me.isFull && player && !isSoldPlayer && !isSkippedPlayer;
  bidBtn.disabled = !canBid;
  if (me.isFull) bidBtn.textContent = '✅ 팀원 4명 완성!';
  else if (isSoldPlayer) bidBtn.textContent = '✅ 이미 낙찰된 선수';
  else if (isSkippedPlayer) bidBtn.textContent = '⏭ 유찰된 선수 (재경매 예정)';
  else bidBtn.textContent = '✋ 입찰하기';

  renderAllCaps(data.captains);
}

function renderAllCaps(caps) {
  document.getElementById('allCaps').innerHTML = caps.map(c => {
    const isMe = c.id === myCapId;
    const members = toArr(c.members);
    return `<div class="ac-row">
      <div class="ac-ord">${c.order}</div>
      <div class="ac-name" style="${isMe?'color:var(--gold);':''}">${c.name}${isMe?' 👈':''}</div>
      <div class="ac-pts ${c.points<80?'lo':''}">${c.points}점</div>
      <div class="ac-slots">
        <div class="slot ldr">👑</div>
        ${Array.from({length:4},(_,i) => {
          const m = members[i];
          if (!m) return `<div class="slot">${i+1}</div>`;
          return `<div class="slot ${isMe?'me':'ok'}" title="${m.nick}">${m.nick.slice(0,2)}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function setQuick(v) {
  document.getElementById('bidInput').value = v;
}

function sendBidRequest() {
  if (myCapId === null || !state) return;
  const amt = parseInt(document.getElementById('bidInput').value);
  if (!amt || amt <= 0) { alert('포인트를 입력해주세요!'); return; }
  const me = state.captains.find(c => c.id === myCapId);
  if (!me) return;
  if (me.isFull) { alert('팀원이 이미 4명이에요!'); return; }
  if (amt > me.points) { alert(`포인트가 부족해요! (보유: ${me.points}점)`); return; }
  if (amt <= (state.currentBid || 0)) { alert(`현재 최고가(${state.currentBid}점)보다 높아야 해요!`); return; }

  reqRef.push({ capId: myCapId, capName: me.name, amount: amt, ts: Date.now() });
  document.getElementById('bidInput').value = '';

  const btn = document.getElementById('bidBtn');
  const orig = btn.textContent;
  btn.textContent = '✅ 입찰 전송됨!';
  btn.style.cssText = 'background:linear-gradient(135deg,#1a4a20,#1e5a25);color:var(--green);border:1px solid var(--green);';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.cssText = '';
    btn.disabled = false;
  }, 1500);
}

function showFlash(nick, capName, pts, isMe) {
  const box = document.getElementById('flashBox');
  box.className = `flash-box${isMe ? ' flash-win' : ''}`;
  document.getElementById('fEm').textContent = isMe ? '🎉' : '🏆';
  document.getElementById('fTit').textContent = isMe ? `${nick} 낙찰! 내 팀!` : `${nick} 낙찰`;
  document.getElementById('fSub').textContent = `${capName} — ${pts}점`;
  const el = document.getElementById('flash');
  el.style.display = 'flex';
  setTimeout(() => el.style.display = 'none', 900);
}
</script>
